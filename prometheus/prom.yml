global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki.railway.internal:3100']
    metrics_path: /metrics

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo.railway.internal:3200']
    metrics_path: /metrics

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana.railway.internal:3000']
    metrics_path: /metrics
